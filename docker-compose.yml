services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daralhai
      POSTGRES_USER: daralhai
      POSTGRES_PASSWORD: daralhai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://daralhai:daralhai_password@postgres:5432/daralhai
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: daralhai
      DB_USER: daralhai
      DB_PASSWORD: daralhai_password
      APP_SECRET: local-docker-secret-change-me
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
